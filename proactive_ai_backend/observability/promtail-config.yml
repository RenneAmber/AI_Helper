# Promtail：把宿主机 ../logs/*.log 推到 Loki。
# 后端进程通过 JSON 结构化日志输出，Loki 那边可直接按字段查询。

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: aido-backend
    static_configs:
      - targets: [localhost]
        labels:
          job: aido-backend
          __path__: /var/log/aido/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            trace_id: trace_id
            logger: logger
      - labels:
          level:
          logger:
