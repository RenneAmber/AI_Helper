# 一键起一整套可观测后端：Prometheus + Grafana + Loki + Tempo + Promtail
#
# 用法：
#   cd proactive_ai_backend/observability
#   docker compose -f docker-compose.observability.yml up -d
#
# 服务端口：
#   Prometheus : http://localhost:9090
#   Grafana    : http://localhost:3000   (admin / admin)
#   Loki       : http://localhost:3100
#   Tempo      : http://localhost:3200   (OTLP gRPC: 4317, HTTP: 4318)
#
# 假设 proactive_ai_backend 跑在宿主机 :8100，
# Prometheus 通过 host.docker.internal 抓取 /metrics。
# Linux 宿主机请保留下面的 extra_hosts 行；Mac/Windows Docker Desktop 默认就支持。

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: aido-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [obs]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: aido-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on: [prometheus, loki, tempo]
    networks: [obs]

  loki:
    image: grafana/loki:3.2.1
    container_name: aido-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    networks: [obs]

  promtail:
    image: grafana/promtail:3.2.1
    container_name: aido-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      # 把宿主机 proactive_ai_backend 的日志目录挂进来；按你的实际路径调整
      - ../logs:/var/log/aido:ro
    depends_on: [loki]
    networks: [obs]

  tempo:
    image: grafana/tempo:2.6.1
    container_name: aido-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo-config.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP
      - "4317:4317"   # OTLP gRPC（把 OTLP_ENDPOINT=http://localhost:4317 配给后端即可）
      - "4318:4318"   # OTLP HTTP
    networks: [obs]

volumes:
  prometheus_data: {}
  grafana_data: {}
  tempo_data: {}

networks:
  obs:
    driver: bridge
