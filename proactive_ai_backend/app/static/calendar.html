<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>Aido · 日程视图</title>
  <style>
    :root {
      --bg: #0f1117; --card: #181b24; --line: #262a36; --fg: #e6e8ee;
      --muted: #8a91a3; --accent: #4ea1ff; --ok: #4ec9b0; --warn: #d7ba7d;
    }
    body { background: var(--bg); color: var(--fg); font: 14px/1.55 -apple-system, "Segoe UI", sans-serif; margin: 0; }
    header { padding: 16px 28px; background: var(--card); border-bottom: 1px solid var(--line); display: flex; gap: 24px; align-items: baseline; flex-wrap: wrap; }
    header h1 { font-size: 18px; margin: 0; }
    header .meta { color: var(--muted); font-size: 12px; }
    main { max-width: 1100px; margin: 16px auto; padding: 0 16px; }
    .controls { background: var(--card); padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .controls label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
    .controls input, .controls select { background: #0f1117; color: var(--fg); border: 1px solid var(--line); padding: 6px 8px; border-radius: 4px; min-width: 160px; }
    .controls button { background: var(--accent); color: #fff; border: 0; padding: 8px 16px; border-radius: 4px; cursor: pointer; align-self: end; }
    .controls button:hover { filter: brightness(1.15); }
    .stats { background: var(--card); padding: 10px 16px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; color: var(--muted); }
    .stats b { color: var(--fg); }
    .day-group { background: var(--card); border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; border-left: 3px solid var(--accent); }
    .day-group h3 { margin: 0 0 8px 0; font-size: 14px; color: var(--accent); }
    .ev { border-top: 1px solid var(--line); padding: 10px 0; display: grid; grid-template-columns: 110px 1fr auto; gap: 12px; }
    .ev:first-of-type { border-top: 0; }
    .ev .time { color: var(--ok); font-variant-numeric: tabular-nums; font-size: 13px; }
    .ev .body .title { font-weight: 600; }
    .ev .body .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .ev .body .desc { color: var(--fg); font-size: 12px; margin-top: 4px; white-space: pre-wrap; }
    .ev .right { color: var(--muted); font-size: 11px; text-align: right; }
    .ev .right code { background: #0f1117; padding: 1px 4px; border-radius: 3px; font-size: 11px; }
    .empty { padding: 40px; text-align: center; color: var(--muted); background: var(--card); border-radius: 8px; }
    .err { color: #f48771; padding: 10px 16px; background: #2a1818; border-radius: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>📅 Aido 日程视图</h1>
    <span class="meta">backend: <span id="backend">?</span> · 直接读 SQLite，不经过 LLM</span>
    <span class="meta" style="margin-left:auto;">
      <a href="index.html" style="color: var(--accent);">← 返回聊天</a>
    </span>
  </header>

  <main>
    <div class="controls">
      <label>user_id <input id="userId" placeholder="留空 = 所有用户" /></label>
      <label>从（time_min）<input id="timeMin" type="datetime-local" /></label>
      <label>到（time_max）<input id="timeMax" type="datetime-local" /></label>
      <label>limit <input id="limit" type="number" value="100" min="1" max="1000" /></label>
      <button onclick="load()">刷新</button>
      <button onclick="setRange('today')" style="background:#3a3f4d;">今天</button>
      <button onclick="setRange('week')" style="background:#3a3f4d;">未来7天</button>
      <button onclick="setRange('month')" style="background:#3a3f4d;">未来30天</button>
      <button onclick="setRange('')" style="background:#3a3f4d;">全部</button>
    </div>

    <div class="stats" id="stats">加载中…</div>
    <div id="list"></div>
  </main>

  <script>
    const BASE = '';

    function pad(n) { return String(n).padStart(2, '0'); }
    function toIsoLocal(d) {
      return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate())
        + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
    function setRange(kind) {
      const now = new Date();
      const min = document.getElementById('timeMin');
      const max = document.getElementById('timeMax');
      if (!kind) { min.value = ''; max.value = ''; load(); return; }
      const start = new Date(now); start.setHours(0,0,0,0);
      const end = new Date(start);
      if (kind === 'today') end.setDate(end.getDate() + 1);
      else if (kind === 'week') end.setDate(end.getDate() + 7);
      else if (kind === 'month') end.setDate(end.getDate() + 30);
      min.value = toIsoLocal(start);
      max.value = toIsoLocal(end);
      load();
    }

    function fmtTime(iso) {
      try {
        const d = new Date(iso);
        return pad(d.getHours()) + ':' + pad(d.getMinutes());
      } catch { return iso; }
    }
    function dateKey(iso) {
      try {
        const d = new Date(iso);
        const days = ['周日','周一','周二','周三','周四','周五','周六'];
        return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + days[d.getDay()];
      } catch { return iso.slice(0, 10); }
    }

    async function loadStats() {
      try {
        const r = await fetch(BASE + '/v1/calendar/stats');
        const j = await r.json();
        document.getElementById('backend').textContent = j.backend || '?';
        const lines = [`总事件 <b>${j.total ?? 0}</b>`];
        (j.users || []).forEach(u => {
          lines.push(`<b>${u.user_id}</b>: ${u.count} 条（${(u.earliest||'?').slice(0,16)} → ${(u.latest||'?').slice(0,16)}）`);
        });
        document.getElementById('stats').innerHTML = lines.join(' · ');
      } catch (e) {
        document.getElementById('stats').innerHTML = `<span class="err">stats 失败: ${e}</span>`;
      }
    }

    async function load() {
      await loadStats();
      const params = new URLSearchParams();
      const uid = document.getElementById('userId').value.trim();
      const tmin = document.getElementById('timeMin').value;
      const tmax = document.getElementById('timeMax').value;
      const limit = document.getElementById('limit').value;
      if (uid) params.set('user_id', uid);
      if (tmin) params.set('time_min', new Date(tmin).toISOString());
      if (tmax) params.set('time_max', new Date(tmax).toISOString());
      if (limit) params.set('limit', limit);

      const listEl = document.getElementById('list');
      listEl.innerHTML = '<div class="empty">加载中…</div>';
      try {
        const r = await fetch(BASE + '/v1/calendar/events?' + params.toString());
        if (!r.ok) {
          listEl.innerHTML = `<div class="err">HTTP ${r.status}: ${await r.text()}</div>`;
          return;
        }
        const j = await r.json();
        renderList(j.events || []);
      } catch (e) {
        listEl.innerHTML = `<div class="err">请求失败: ${e}</div>`;
      }
    }

    function renderList(events) {
      const listEl = document.getElementById('list');
      if (!events.length) {
        listEl.innerHTML = '<div class="empty">没有符合条件的日程。<br/>可能原因：① 库里就是空的；② user_id 没对上；③ 时间窗排除了。</div>';
        return;
      }
      // 按日期 group
      const groups = {};
      for (const ev of events) {
        const k = dateKey(ev.start_at);
        (groups[k] = groups[k] || []).push(ev);
      }
      const html = Object.keys(groups).sort().map(k => {
        const items = groups[k].map(ev => {
          let attendees = '';
          try { attendees = (JSON.parse(ev.attendees || '[]') || []).join(', '); } catch {}
          const meta = [
            ev.location ? '📍 ' + ev.location : '',
            attendees ? '👥 ' + attendees : '',
            'source=' + ev.source,
          ].filter(Boolean).join(' · ');
          return `
            <div class="ev">
              <div class="time">${fmtTime(ev.start_at)} – ${fmtTime(ev.end_at)}</div>
              <div class="body">
                <div class="title">${escapeHtml(ev.title)}</div>
                ${meta ? '<div class="meta">' + escapeHtml(meta) + '</div>' : ''}
                ${ev.description ? '<div class="desc">' + escapeHtml(ev.description) + '</div>' : ''}
              </div>
              <div class="right">
                <div>user: <code>${escapeHtml(ev.user_id)}</code></div>
                <div>id: <code>${ev.id.slice(0,8)}</code></div>
              </div>
            </div>
          `;
        }).join('');
        return `<div class="day-group"><h3>${k}</h3>${items}</div>`;
      }).join('');
      listEl.innerHTML = html;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }

    // 默认显示未来 30 天
    setRange('month');
  </script>
</body>
</html>
